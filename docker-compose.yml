services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - POETRY_VIRTUALENVS_CREATE=false
      - DA_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    env_file:
      - ./backend/.env  # Contains ANTHROPIC_API_KEY (gitignored)
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data  # Persistent database storage

    command: python -m app.dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
      - VITE_PROVIDER=ollama
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

    command: npm run dev
